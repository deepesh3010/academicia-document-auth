<!DOCTYPE html>
<html>
<head>
<title>Document Authentication System</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">

<h2 class="text-2xl font-bold mb-6 text-center">
Secure Document Login
</h2>

<input id="username" placeholder="Username"
class="w-full border p-2 mb-4 rounded"/>

<input id="password" type="password" placeholder="Password"
class="w-full border p-2 mb-4 rounded"/>

<button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">
Login

</button>

<button onclick="goRegister()" class="w-full bg-gray-500 text-white p-2 rounded">
Register
</button>

</div>

<script src="/static/app.js"></script>

</body>
</html>
