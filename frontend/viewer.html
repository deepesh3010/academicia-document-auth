<!DOCTYPE html>
<html>
<head>
<title>Document Viewer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-4">Document Viewer</h1>

<iframe id="pdfViewer"
class="w-full h-[600px] border"></iframe>

<div class="mt-4">
<button onclick="signDocument()"
class="bg-green-600 text-white px-6 py-2 rounded">
Sign Document
</button>
</div>

<script>

const params = new URLSearchParams(window.location.search)
const docId = params.get("doc").replace(".pdf", "")   // ✅ REMOVE .pdf

const token = localStorage.getItem("token")

document.getElementById("pdfViewer").src =
  "/document/" + docId + "?token=" + token


function signDocument(){

const token = localStorage.getItem("token")

fetch("/sign/" + docId,{
method:"POST",
headers:{
"Authorization":"Bearer " + token
}
})
.then(res=>res.json())
.then(data=>{

alert("Document signed & QR embedded successfully ✅")

window.location.href="/dashboard"

})

}

</script>

</body>
</html>
